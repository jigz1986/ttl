<!DOCTYPE html>

<head>
    <meta http-equiv="refresh" content="31">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400..900&display=swap" rel="stylesheet">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TTL</title>
    <style>
        html 
        {display: inline-flex;
        width: 99vw;	  height: 98vh;
         align-items: center;
         justify-content: center;
         text-align: center;
         font-size: 200px; 
         color: white;
        font-family: "Orbitron", sans-serif;
        font-weight: 400;
          font-style: normal;
        } 
        
        div:hover	
        {    opacity: 0;
        	transition: opacity .8s linear; 
            color: black;   
        }

        @media (max-width: 1000px)  {
        div {
            color: black;
        font-size: 10vw;}
        }
    </style>

</head>

<body>
    <div id="time"></div>
    <script>
        const date = new Date();
        var h = 17 - date.getHours();
        var m = 61 - date.getMinutes();
        document.getElementById("time").innerHTML = h +" : "+m;
    </script>

</body>

</html>
