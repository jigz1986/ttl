<!DOCTYPE html>
<head>
  <title>TTL</title>
  <style>
  html {
  display: inline-flex;
    width: 100%;
    height: 97vh;
    justify-content: center;
    align-items: center;
	}
	
	
    div  {
	height: 70vh;
    color: #ffffff;
    display: inline-flex;
    align-items: center;
    justify-content: center;
	 font-family: 'League Script', Helvetica, Arial, sans-serif;
  font-size: 200px;
  margin: 0 auto;
  text-align: center;
}

    div:hover{    
    opacity: 0; 
	transition: opacity .8s linear;
    color: black;
    }

</style>
</head>
<body>
<div id="time"></div>
<script>
const date = new Date();
var h = 17 - date.getHours();
var m = 60 - date.getMinutes();
document.getElementById("time").innerHTML = h +" "+m;
window.setInterval(function() {     
  document.title = h +" "+m;
  console.log(h +" "+ m);}, 
  1000 * 1000)
</script>

</body>
